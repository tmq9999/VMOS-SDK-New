openapi: 3.1.0
info:
  title: VMOSCloud OpenAPI
  description: |
    VMOSCloud server OpenAPI spec for AI/LLM/code assistants and tools.
    API descriptions and request/response params match OpenAPI.md.
    Auth and signing see Getting Started example.md.
  version: "1.0.0"

servers:
  - url: https://api.vmoscloud.com
    description: VMOSCloud API server

security:
  - VMOSCloudHMAC: []

tags:
  - name: Instance Management
  - name: Resource Management
  - name: Application Management
  - name: Task Management
  - name: Cloud Phone Management
  - name: Email Verification Service
  - name: Dynamic Proxy Service
  - name: Static Residential Proxy Service
  - name: SDK Token

paths:
  /vcpcloud/api/padApi/setWifiList:
    post:
      tags:
        - Instance Management
      summary: Modify instance WIFI properties
      operationId: vcpcloud_api_padApi_setWifiList_post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - padCodes
                - wifiJsonList
                - SSID
                - BSSID
                - MAC
                - IP
                - gateway
                - DNS1
                - DNS2
              properties:
                padCodes:
                  type: array
                  items:
                    type: string
                  description: 实例编号
                wifiJsonList:
                  type: array
                  items:
                    type: string
                  description: wifi属性列表
                SSID:
                  type: string
                  description: wifi名称 (不支持中文)
                BSSID:
                  type: string
                  description: 接入点mac地址
                MAC:
                  type: string
                  description: wifi网卡mac地址
                IP:
                  type: string
                  description: wifi网络IP
                gateway:
                  type: string
                  description: wifi网关
                DNS1:
                  type: string
                  description: DNS1
                DNS2:
                  type: string
                  description: DNS2
                hessid:
                  type: integer
                  description: 网络标识符
                anqpDomainId:
                  type: integer
                  description: ANQP（Access Network Query Protocol）域ID
                capabilities:
                  type: string
                  description: WPA/WPA2等信息
                level:
                  type: integer
                  description: 信号强度（RSSI）
                linkSpeed:
                  type: integer
                  description: 当前Wi-Fi连接速率
                txLinkSpeed:
                  type: integer
                  description: 上传链路速度
                rxLinkSpeed:
                  type: integer
                  description: 下载链路速度
                frequency:
                  type: integer
                  description: Wi-Fi信道频率
                distance:
                  type: integer
                  description: 估算的AP距离
                distanceSd:
                  type: integer
                  description: 估算距离的标准差
                channelWidth:
                  type: integer
                  description: 信道带宽
      responses:
        "200":
          $ref: "#/components/responses/SuccessResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
  /vcpcloud/api/padApi/padDetails:
    post:
      tags:
        - Instance Management
      summary: Instance details (pending)
      operationId: vcpcloud_api_padApi_padDetails_post
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          $ref: "#/components/responses/SuccessResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
  /vcpcloud/api/padApi/restart:
    post:
      tags:
        - Instance Management
      summary: Instance restart
      operationId: vcpcloud_api_padApi_restart_post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - padCodes
              properties:
                padCodes:
                  type: array
                  items:
                    type: string
      responses:
        "200":
          description: Success response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          taskId:
                            type: integer
                            description: 任务ID
                          padCode:
                            type: string
                            description: 实例编号
                          vmStatus:
                            type: integer
                            description: 实例在线状态（0：离线；1：在线）
        default:
          $ref: "#/components/responses/ErrorResponse"
  /vcpcloud/api/padApi/reset:
    post:
      tags:
        - Instance Management
      summary: Instance reset
      operationId: vcpcloud_api_padApi_reset_post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - padCodes
              properties:
                padCodes:
                  type: array
                  items:
                    type: string
      responses:
        "200":
          description: Success response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          taskId:
                            type: integer
                            description: 任务ID
                          padCode:
                            type: string
                            description: 实例编号
                          vmStatus:
                            type: integer
                            description: 实例在线状态（0：离线；1：在线）
        default:
          $ref: "#/components/responses/ErrorResponse"
  /vcpcloud/api/padApi/padProperties:
    post:
      tags:
        - Instance Management
      summary: Query instance properties
      operationId: vcpcloud_api_padApi_padProperties_post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - padCode
              properties:
                padCode:
                  type: string
                  description: 实例编号
      responses:
        "200":
          description: Success response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          padCode:
                            type: string
                            description: 实例编号
                          modemPropertiesList:
                            type: array
                            items:
                              type: object
                            description: Modem-属性列表
                          propertiesName:
                            type: string
                            description: 属性名称
                          propertiesValue:
                            type: string
                            description: 属性值
                          systemPropertiesList:
                            type: array
                            items:
                              type: object
                            description: 系统-属性列表
                          settingPropertiesList:
                            type: array
                            items:
                              type: object
                            description: setting-属性列表
                          oaidPropertiesList:
                            type: array
                            items:
                              type: object
                            description: oaid-属性列表
        default:
          $ref: "#/components/responses/ErrorResponse"
  /vcpcloud/api/padApi/batchPadProperties:
    post:
      tags:
        - Instance Management
      summary: Batch query instance properties
      operationId: vcpcloud_api_padApi_batchPadProperties_post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - padCodes
              properties:
                padCodes:
                  type: array
                  items:
                    type: string
                  description: 实例数量不多余200个
      responses:
        "200":
          description: Success response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          padCode:
                            type: string
                            description: 实例编号
                          modemPropertiesList:
                            type: array
                            items:
                              type: object
                            description: Modem-属性列表
                          propertiesName:
                            type: string
                            description: 属性名称
                          propertiesValue:
                            type: string
                            description: 属性值
                          systemPropertiesList:
                            type: array
                            items:
                              type: object
                            description: 系统-属性列表
                          settingPropertiesList:
                            type: array
                            items:
                              type: object
                            description: setting-属性列表
                          oaidPropertiesList:
                            type: array
                            items:
                              type: object
                            description: oaid-属性列表
        default:
          $ref: "#/components/responses/ErrorResponse"
  /vcpcloud/api/padApi/updatePadProperties:
    post:
      tags:
        - Instance Management
      summary: Modify instance properties (dynamic)
      operationId: vcpcloud_api_padApi_updatePadProperties_post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - padCodes
              properties:
                padCodes:
                  type: array
                  items:
                    type: string
                modemPersistPropertiesList:
                  type: array
                  items:
                    type: string
                  description: Modem-持久化-属性列表
                propertiesName:
                  type: string
                  description: 属性名称
                propertiesValue:
                  type: string
                  description: 属性值
                modemPropertiesList:
                  type: array
                  items:
                    type: string
                  description: Modem-非持久化-属性列表
                systemPersistPropertiesList:
                  type: array
                  items:
                    type: string
                  description: 系统-持久化-属性列表
                systemPropertiesList:
                  type: array
                  items:
                    type: string
                  description: 系统-非持久化-属性列表
                settingPropertiesList:
                  type: array
                  items:
                    type: string
                  description: setting-属性列表
                oaidPropertiesList:
                  type: array
                  items:
                    type: string
                  description: oaid-属性列表
      responses:
        "200":
          description: Success response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          taskId:
                            type: integer
                            description: 任务ID
                          padCode:
                            type: string
                            description: 实例编号
                          vmStatus:
                            type: integer
                            description: 实例在线状态（0：离线；1：在线）
        default:
          $ref: "#/components/responses/ErrorResponse"
  /vcpcloud/api/padApi/updatePadAndroidProp:
    post:
      tags:
        - Instance Management
      summary: Modify instance Android modification props (restart required)
      operationId: vcpcloud_api_padApi_updatePadAndroidProp_post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - props
                - ro.product.vendor.name
              properties:
                padCode:
                  type: string
                  description: 实例id
                restart:
                  type: boolean
                  description: 设置完成后自动重启（默认false）
                props:
                  type: object
                  description: 系统属性（此字段为key-value定义）
                ro.product.vendor.name:
                  type: string
                  description: 属性设置
      responses:
        "200":
          description: Success response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          taskId:
                            type: integer
                            description: 任务id
                          padCode:
                            type: string
                            description: 实例id
                          taskStatus:
                            type: integer
                            description: 任务状态（-1：任务已存在，请勿重复提交；1：任务已添加）
        default:
          $ref: "#/components/responses/ErrorResponse"
  /vcpcloud/api/padApi/updateSIM:
    post:
      tags:
        - Instance Management
      summary: Modify SIM by country code
      operationId: vcpcloud_api_padApi_updateSIM_post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - padCode
              properties:
                padCode:
                  type: string
                  description: 实例id
                countryCode:
                  type: string
                  description: 国家code
                props:
                  type: object
                  description: 系统属性（此字段为key-value定义）
                ro.product.vendor.name:
                  type: string
                  description: 属性设置
      responses:
        "200":
          description: Success response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          traceId:
                            type: string
                            description: 链路追踪ID
                          taskId:
                            type: integer
                            description: 任务ID
                          padCode:
                            type: string
                            description: 实例编号
                          vmStatus:
                            type: integer
                            description: 实例在线状态（0：离线；1：在线）
                          taskStatus:
                            type: integer
                            description: 任务状态（-1：任务已存在，请勿重复提交；1：任务已添加）
        default:
          $ref: "#/components/responses/ErrorResponse"
  /vcpcloud/api/padApi/dissolveRoom:
    post:
      tags:
        - Instance Management
      summary: Stop streaming
      operationId: vcpcloud_api_padApi_dissolveRoom_post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - padCodes
              properties:
                padCodes:
                  type: array
                  items:
                    type: string
      responses:
        "200":
          description: Success response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          traceId:
                            type: string
                            description: 链路追踪ID
                          successList:
                            type: array
                            items:
                              type: object
                            description: 成功集合
                          padCode:
                            type: string
                            description: 实例编号
                          failList:
                            type: array
                            items:
                              type: object
                            description: 失败集合
                          errorCode:
                            type: integer
                            description: 错误码
                          errorMsg:
                            type: string
                            description: 失败的原因
        default:
          $ref: "#/components/responses/ErrorResponse"
  /vcpcloud/api/padApi/checkIP:
    post:
      tags:
        - Instance Management
      summary: Smart IP proxy detection
      operationId: vcpcloud_api_padApi_checkIP_post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - host
                - port
                - account
                - password
                - type
              properties:
                host:
                  type: string
                  description: 代理信息 (ip或host)
                port:
                  type: integer
                  description: 代理端口 (数字类型)
                account:
                  type: string
                  description: 代理用户名
                password:
                  type: string
                  description: 代理密码
                type:
                  type: string
                  description: 代理协议类型 Socks5、 http、https
                country:
                  type: string
                  description: "国家-强行指定时必填 - 参数请参考：curl -x http://用户名:密码@ip:端口 https://ipinfo.io?token=注册就有的token 当使用了强行指定后，系统会直接使用指"
                ip:
                  type: string
                  description: ip-强行指定时必填
                loc:
                  type: string
                  description: 经，纬度-强行指定时必填
                city:
                  type: string
                  description: 城市-强行指定时必填
                region:
                  type: string
                  description: 地区-强行指定时必填
                timezone:
                  type: string
                  description: 时区-强行指定时必填
      responses:
        "200":
          description: Success response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          proxyLocation:
                            type: string
                            description: 归属地
                          publicIp:
                            type: string
                            description: 出口IP
                          proxyWorking:
                            type: boolean
                            description: 检测成功-true 检测失败-false
        default:
          $ref: "#/components/responses/ErrorResponse"
  /vcpcloud/api/padApi/smartIp:
    post:
      tags:
        - Instance Management
      summary: Set smart IP
      operationId: vcpcloud_api_padApi_smartIp_post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - padCodes
                - host
                - port
                - account
                - password
                - type
                - mode
              properties:
                padCodes:
                  type: array
                  items:
                    type: string
                host:
                  type: string
                  description: 代理信息 (ip或host)
                port:
                  type: integer
                  description: 代理端口 (数字类型)
                account:
                  type: string
                  description: 代理用户名
                password:
                  type: string
                  description: 代理密码
                type:
                  type: string
                  description: 代理协议类型 socks5、 http、https
                mode:
                  type: string
                  description: 设置代理的模式 vpn / proxy
                bypassPackageList:
                  type: array
                  items:
                    type: string
                  description: 包名 设置该包名不走代理
                bypassIpList:
                  type: array
                  items:
                    type: string
                  description: ip 设置该ip不走代理
                bypassDomainList:
                  type: array
                  items:
                    type: string
                  description: 域名 设置该域名不走代理
                followLanguage:
                  type: boolean
                  description: 是否跟随代理IP自动切换云机语言
      responses:
        "200":
          $ref: "#/components/responses/SuccessResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
  /vcpcloud/api/padApi/notSmartIp:
    post:
      tags:
        - Instance Management
      summary: Cancel smart IP
      operationId: vcpcloud_api_padApi_notSmartIp_post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - padCodes
              properties:
                padCodes:
                  type: array
                  items:
                    type: string
      responses:
        "200":
          $ref: "#/components/responses/SuccessResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
  /vcpcloud/api/padApi/getTaskStatus:
    post:
      tags:
        - Instance Management
      summary: Device task result query (smart IP)
      operationId: vcpcloud_api_padApi_getTaskStatus_post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - taskId
              properties:
                taskId:
                  type: string
                  description: 任务ID
      responses:
        "200":
          description: Success response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          padCode:
                            type: string
                            description: 实例编号
                          taskStatus:
                            type: string
                            description: 任务状态：Executing-执行中 Successfully-已成功 Failed-已失败 Timedout-已超时
                          taskType:
                            type: integer
                            description: 任务类型：10010-设置智能IP 10011-取消智能IP
        default:
          $ref: "#/components/responses/ErrorResponse"
  /vcpcloud/api/padApi/getListInstalledApp:
    post:
      tags:
        - Instance Management
      summary: Get installed apps for specified instances
      operationId: vcpcloud_api_padApi_getListInstalledApp_post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - padCodeList
              properties:
                padCodeList:
                  type: array
                  items:
                    type: string
      responses:
        "200":
          description: Success response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          appName:
                            type: string
                            description: APP名称
                          packageName:
                            type: string
                            description: APP包名
        default:
          $ref: "#/components/responses/ErrorResponse"
  /vcpcloud/api/padApi/updateTimeZone:
    post:
      tags:
        - Instance Management
      summary: Modify instance timezone
      operationId: vcpcloud_api_padApi_updateTimeZone_post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - timeZone
                - padCodes
              properties:
                timeZone:
                  type: string
                  description: UTC标准时间
                padCodes:
                  type: array
                  items:
                    type: string
                  description: 实例列表
      responses:
        "200":
          description: Success response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          traceId:
                            type: string
                            description: 链路追踪ID
                          taskId:
                            type: integer
                            description: 任务ID
                          padCode:
                            type: string
                            description: 房间号
                          vmStatus:
                            type: integer
                            description: 实例在线状态（0：离线；1：在线）
                          taskStatus:
                            type: integer
                            description: 任务状态（-1：任务已存在，请勿重复提交；1：任务已添加）
        default:
          $ref: "#/components/responses/ErrorResponse"
  /vcpcloud/api/padApi/updateLanguage:
    post:
      tags:
        - Instance Management
      summary: Modify instance language
      operationId: vcpcloud_api_padApi_updateLanguage_post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - language
                - padCodes
              properties:
                language:
                  type: string
                  description: 语言
                country:
                  type: string
                  description: 国家
                padCodes:
                  type: array
                  items:
                    type: string
                  description: 实例列表
      responses:
        "200":
          description: Success response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          traceId:
                            type: string
                            description: 链路追踪ID
                          taskId:
                            type: integer
                            description: 任务ID
                          padCode:
                            type: string
                            description: 房间号
                          vmStatus:
                            type: integer
                            description: 实例在线状态（0：离线；1：在线）
        default:
          $ref: "#/components/responses/ErrorResponse"
  /vcpcloud/api/padApi/gpsInjectInfo:
    post:
      tags:
        - Instance Management
      summary: Set instance GPS
      operationId: vcpcloud_api_padApi_gpsInjectInfo_post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - longitude
                - latitude
                - padCodes
              properties:
                longitude:
                  type: string
                  description: 经度
                latitude:
                  type: string
                  description: 纬度
                altitude:
                  type: string
                  description: 海拔 (需要更新到最新镜像)
                speed:
                  type: string
                  description: 速度，m/s (20251024之后的镜像)
                bearing:
                  type: string
                  description: 速度方向，° (20251024之后的镜像)
                horizontalAccuracyMeters:
                  type: string
                  description: 水平精度 (20251024之后的镜像)
                padCodes:
                  type: array
                  items:
                    type: string
